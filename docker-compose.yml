services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      SERVER_PORT: 8080
      AI_BASE_URL: http://ia:5000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    expose:
      - "8080"
    depends_on:
      - ia
    restart: unless-stopped
    volumes:
      - backend-uploads:/app/uploads
    networks:
      - app-network

  ia:
    build:
      context: ./backend/IA
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  backend-uploads:
